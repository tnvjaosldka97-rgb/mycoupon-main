    <!-- 다크 모드 강제 비활성화 (최우선 실행) -->
    <script>
      // 즉시 실행: 페이지 로드 전에도 다크 모드 방지
      (function() {
        // document가 준비되기 전에도 실행 가능한 코드
        if (document.documentElement) {
          document.documentElement.classList.remove('dark');
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.style.setProperty('background-color', '#FFF5F0', 'important');
          document.documentElement.style.setProperty('color', '#000000', 'important');
        }
        if (document.body) {
          document.body.classList.remove('dark');
          document.body.style.setProperty('background-color', '#FFF5F0', 'important');
          document.body.style.setProperty('color', '#000000', 'important');
        }
        
        // localStorage의 다크 모드 설정 즉시 삭제
        try {
          if (localStorage.getItem('theme') === 'dark') {
            localStorage.removeItem('theme');
            localStorage.setItem('theme', 'light');
          }
        } catch(e) {}
        
        // 카톡→크롬 리다이렉트 감지 및 install-mode 플래그 설정 (가장 빠르게)
        try {
          const urlParams = new URLSearchParams(window.location.search);
          const fromKakao = urlParams.get('from') === 'kakao';
          const isInstallMode = urlParams.get('install') === 'true';

          if (isInstallMode && fromKakao) {
            sessionStorage.setItem('install-mode', 'true');
            console.log('[index.html] 카톡→크롬 리다이렉트 감지, install-mode 설정 완료');
          }
        } catch(e) {
          console.error('[index.html] install-mode 설정 오류:', e);
        }
      })();
    </script>

    <!-- ─────────────────────────────────────────────────────────────────
      SW Tombstone Sweep (Migration v2 — 2026-04-20)
      목적: Chrome 일반모드에 잔존한 구 SW(v4)가 stale JS chunk를 serve
            하여 초기 렌더 후 freeze 유발. 세션당 1회 모든 SW unregister.
      안전: Capacitor 앱 스킵 / OAuth callback 스킵 / 비동기(비차단) / reload 없음
      cf. fetch handler 없는 tombstone이라 unregister해도 기능 손실 0
    ──────────────────────────────────────────────────────────────────── -->
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) return;
        // Capacitor 네이티브 스킵 — 앱 로그인 플로우 무영향 보장
        try {
          if (typeof window.Capacitor !== 'undefined' &&
              window.Capacitor.isNativePlatform &&
              window.Capacitor.isNativePlatform()) return;
        } catch (_) {}
        // OAuth callback 진행 중이면 스킵 — 계약면 무접촉
        try {
          var p = new URLSearchParams(window.location.search);
          if (p.has('code') || p.has('state') || p.has('auth_callback')) return;
          if (window.location.pathname.indexOf('/auth/finalize') === 0) return;
        } catch (_) {}
        // 세션당 1회
        try {
          if (sessionStorage.getItem('__mc_sw_sweep_v2')) return;
          sessionStorage.setItem('__mc_sw_sweep_v2', '1');
        } catch (_) { return; }
        // 비차단 async unregister
        try {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (!regs || regs.length === 0) {
              console.log('[SW-SWEEP-V2] clean — no SW registered');
              return;
            }
            console.log('[SW-SWEEP-V2] unregistering', regs.length, 'SW(s)');
            return Promise.all(regs.map(function(r) {
              return r.unregister().then(function(ok) {
                console.log('[SW-SWEEP-V2] unregistered:', r.scope, 'ok:', ok);
              });
            }));
          }).catch(function(e) { console.warn('[SW-SWEEP-V2] error:', e); });
        } catch (_) {}
      })();
    </script>

    <!-- PWA Standalone 모드 캐시 강제 삭제 -->
    <script>
      // PWA 앱으로 실행 중인지 감지 (standalone 모드)
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                          window.navigator.standalone || 
                          document.referrer.includes('android-app://');
      
      if (isStandalone) {
        console.log('[PWA] Running in standalone mode, checking cache...');
        
        const PWA_CACHE_CLEARED_KEY = 'pwa-cache-cleared-v12';
        const cacheCleared = sessionStorage.getItem(PWA_CACHE_CLEARED_KEY);
        
        // 앱 시작 시 한 번만 캐시 삭제
        if (!cacheCleared) {
          console.log('[PWA] First launch detected, clearing all caches...');
          
          // 모든 캐시 강제 삭제
          if ('caches' in window) {
            caches.keys().then(cacheNames => {
              return Promise.all(
                cacheNames.map(cacheName => {
                  console.log('[PWA] Deleting cache:', cacheName);
                  return caches.delete(cacheName);
                })
              );
            }).then(() => {
              console.log('[PWA] All caches deleted');
              
              // Service Worker 재등록
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                  return Promise.all(
                    registrations.map(reg => {
                      console.log('[PWA] Unregistering SW:', reg.scope);
                      return reg.unregister();
                    })
                  );
                }).then(() => {
                  console.log('[PWA] All SWs unregistered, registering new one...');
                  return navigator.serviceWorker.register('/service-worker.js');
                }).then(() => {
                  console.log('[PWA] New SW registered');
                  
                  // 캐시 삭제 완료 표시
                  sessionStorage.setItem(PWA_CACHE_CLEARED_KEY, 'true');
                  
                  // 강제 새로고침 (한 번만)
                  console.log('[PWA] Reloading to apply changes...');
                  window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now();
                });
              } else {
                sessionStorage.setItem(PWA_CACHE_CLEARED_KEY, 'true');
                window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now();
              }
            });
          } else {
            sessionStorage.setItem(PWA_CACHE_CLEARED_KEY, 'true');
          }
        }
      }
    </script>
    
    <!-- APP_VERSION 전역 변수 주입 (Vite 빌드 시 자동 교체) -->
    <script>
      window.APP_VERSION = '__SW_VERSION__';
      console.log('[APP] Version:', window.APP_VERSION);
    </script>
    
    <!-- Service Worker 강제 업데이트 로직 (완전 자동 버전 관리 - iOS/Android 모두 지원) -->
    <!-- Sweep v2 가드: 같은 세션에서 이미 모든 SW 해제됐으면 재등록 생략 (SW-free 유지) -->
    <script>
      if ('serviceWorker' in navigator && !sessionStorage.getItem('__mc_sw_sweep_v2')) {
        // Vite 빌드 시 자동으로 타임스탬프 버전으로 교체됨
        const CURRENT_SW_VERSION = '__SW_VERSION__';
        const SW_VERSION_KEY = 'sw-version';
        
        // iOS/Android 환경 감지
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isAndroid = /Android/.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                            window.navigator.standalone === true;
        
        console.log('[SW Update] Platform:', isIOS ? 'iOS' : isAndroid ? 'Android' : 'Desktop', 
                    'Standalone:', isStandalone);
        
        // 저장된 Service Worker 버전 확인
        const savedVersion = localStorage.getItem(SW_VERSION_KEY);
        
        console.log('[SW Update] Saved version:', savedVersion, 'Current version:', CURRENT_SW_VERSION);
        
        // 버전이 다르면 완전히 제거하고 재등록
        console.log('[SW-FLOW] version-check { saved:', savedVersion, '| current:', CURRENT_SW_VERSION, '| match:', savedVersion === CURRENT_SW_VERSION, '| url:', window.location.href.slice(0, 80), '| t:', performance.now().toFixed(0), '}');
        if (savedVersion !== CURRENT_SW_VERSION) {
          console.log('[SW-FLOW] mismatch → unregister+clear { t:', performance.now().toFixed(0), '}');
          console.log('[SW Update] Version mismatch! Current:', CURRENT_SW_VERSION, 'Saved:', savedVersion);
          
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            // 모든 Service Worker 완전 제거
            Promise.all(
              registrations.map(registration => {
                console.log('[SW Update] Unregistering:', registration.scope);
                return registration.unregister();
              })
            ).then(() => {
              console.log('[SW Update] All service workers unregistered');
              
              // 모든 캐시 삭제
              return caches.keys().then(cacheNames => {
                return Promise.all(
                  cacheNames.map(cacheName => {
                    console.log('[SW Update] Deleting cache:', cacheName);
                    return caches.delete(cacheName);
                  })
                );
              });
            }).then(() => {
              console.log('[SW Update] All caches deleted');
              
              // 새 버전 등록
              return navigator.serviceWorker.register('/service-worker.js');
            }).then(registration => {
              console.log('[SW Update] New service worker registered:', registration.scope);
              
              // 버전 저장
              localStorage.setItem(SW_VERSION_KEY, CURRENT_SW_VERSION);
              
              // 페이지 강제 새로고침 (한 번만) - 캐시 무시
              const reloadKey = 'sw-force-reload-' + CURRENT_SW_VERSION;
              // OAuth callback 진행 중이면 리다이렉트 금지 (auth_callback=1 또는 code= 파라미터)
              // 이유: 리다이렉트가 ?auth_callback=1 파라미터를 파괴해 로그인 실패 유발
              const _oauthParams = new URLSearchParams(window.location.search);
              const _isOAuthCallback = _oauthParams.has('auth_callback') || _oauthParams.has('code') || window.location.pathname.startsWith('/auth/finalize');
              if (!sessionStorage.getItem(reloadKey) && !_isOAuthCallback) {
                sessionStorage.setItem(reloadKey, 'true');

                // 모든 sessionStorage 클리어 (캐시 문제 방지) — sw-reloaded 포함 초기화
                const keysToKeep = ['sw-force-reload-' + CURRENT_SW_VERSION];
                Object.keys(sessionStorage).forEach(key => {
                  if (!keysToKeep.includes(key)) {
                    sessionStorage.removeItem(key);
                  }
                });

                const redirectTarget = window.location.pathname + '?v=' + Date.now();
                console.log('[SW-FLOW] force-reload { url:', redirectTarget, '| t:', performance.now().toFixed(0), '}');
                window.location.href = redirectTarget;
              } else if (_isOAuthCallback) {
                console.log('[SW-FLOW] skip-reload-during-oauth { url:', window.location.href.slice(0, 80), '| t:', performance.now().toFixed(0), '}');
                sessionStorage.removeItem(reloadKey); // 다음 방문 시 리로드 허용
              } else {
                console.log('[SW-FLOW] skip-reload-already-done { reloadKey:', reloadKey, '| t:', performance.now().toFixed(0), '}');
              }
            }).catch(error => {
              console.error('[SW Update] Error during service worker update:', error);
            });
          });
        } else {
          // 버전이 같으면 일반 등록
          console.log('[SW-FLOW] version-match → register-on-load { t:', performance.now().toFixed(0), '}');

          window.addEventListener('load', () => {
            console.log('[SW-FLOW] window.load fired — registering SW { t:', performance.now().toFixed(0), '}');
            navigator.serviceWorker.register('/service-worker.js')
              .then(registration => {
                console.log('[SW-FLOW] registration found { scope:', registration.scope, '| t:', performance.now().toFixed(0), '}');
                
                // 자동 업데이트 감지
                registration.addEventListener('updatefound', () => {
                  const newWorker = registration.installing;
                  console.log('[SW-FLOW] updatefound { t:', performance.now().toFixed(0), '}');
                  
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('[SW] New service worker installed, sending SKIP_WAITING...');
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                  });
                });
                
                // 1시간마다 업데이트 체크
                setInterval(() => {
                  console.log('[SW] Checking for updates...');
                  registration.update();
                }, 60 * 60 * 1000);
              })
              .catch(error => {
                console.error('[SW] Service Worker registration failed:', error);
              });
          });
          
          // controllerchange 감지 — 로그만, 리로드 없음
          // 이유: tombstone SW는 fetch 핸들러 없음 → 리로드해도 캐시 이득 없음
          //       리로드는 auth.me 요청 중단 + SessionLoadingGate 10초 타이머 리셋을 유발
          //       → 첫 진입 무한 스피너 원인
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('[SW-FLOW] controllerchange { url:', window.location.href.slice(0, 80), '| t:', performance.now().toFixed(0), '| NO-RELOAD: tombstone has no fetch handler }');
          });
          
          // 로그인/로그아웃 시 캐시 강제 갱신
          window.addEventListener('storage', (e) => {
            // 다른 탭에서 로그인/로그아웃 이벤트 감지
            if (e.key === 'auth-state-changed') {
              console.log('[SW] Auth state changed, clearing cache and reloading...');
              
              // 모든 캐시 삭제
              caches.keys().then(cacheNames => {
                return Promise.all(
                  cacheNames.map(cacheName => {
                    console.log('[SW] Deleting cache:', cacheName);
                    return caches.delete(cacheName);
                  })
                );
              }).then(() => {
                console.log('[SW] All caches cleared, reloading...');
                window.location.reload();
              });
            }
          });
        }
      }
    </script>

  <body style="margin: 0; padding: 0; background-color: #FFF5F0 !important; color: #000000 !important;">
    <!-- 다크 모드 강제 비활성화 및 캐시 강제 삭제 -->
    <script>
      // 즉시 실행: DOM 로드 전에도 다크 모드 방지
      (function() {
        // 즉시 다크 모드 클래스 제거
        if (document.documentElement) {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.backgroundColor = '#FFF5F0';
          document.documentElement.style.color = '#000000';
        }
        if (document.body) {
          document.body.classList.remove('dark');
          document.body.style.backgroundColor = '#FFF5F0';
          document.body.style.color = '#000000';
        }
        
        // localStorage의 다크 모드 설정 삭제
        try {
          if (localStorage.getItem('theme') === 'dark') {
            localStorage.removeItem('theme');
          }
        } catch(e) {}
      })();
      
      // DOMContentLoaded 이벤트에서도 실행
      document.addEventListener('DOMContentLoaded', function() {
      // 페이지 로드 시 즉시 다크 모드 클래스 제거
      document.documentElement.classList.remove('dark');
      document.body.classList.remove('dark');
        document.documentElement.style.backgroundColor = '#FFF5F0';
        document.documentElement.style.color = '#000000';
        document.body.style.backgroundColor = '#FFF5F0';
        document.body.style.color = '#000000';
      
      // localStorage의 다크 모드 설정 삭제
      if (localStorage.getItem('theme') === 'dark') {
        localStorage.removeItem('theme');
      }
      
      // MutationObserver로 다크 모드 클래스 추가 방지
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
            if (document.documentElement.classList.contains('dark')) {
              document.documentElement.classList.remove('dark');
                document.documentElement.style.backgroundColor = '#FFF5F0';
                document.documentElement.style.color = '#000000';
            }
            if (document.body.classList.contains('dark')) {
              document.body.classList.remove('dark');
                document.body.style.backgroundColor = '#FFF5F0';
                document.body.style.color = '#000000';
              }
            }
        });
      });
      
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['class']
      });
      
      observer.observe(document.body, {
        attributes: true,
        attributeFilter: ['class']
        });
        
        // 주기적으로 다크 모드 클래스 확인 및 제거 (1초마다)
        setInterval(function() {
          if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#FFF5F0';
            document.documentElement.style.color = '#000000';
          }
          if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            document.body.style.backgroundColor = '#FFF5F0';
            document.body.style.color = '#000000';
          }
        }, 1000);
      });
      
      // 개발 서버 접속 시 모든 캐시 강제 삭제 (예전 캐싱 방지)
      if (window.location.hostname === '172.30.1.46' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('[Dev] Development server detected, clearing all caches...');
        
        // 모든 Service Worker 제거
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            return Promise.all(
              registrations.map(reg => {
                console.log('[Dev] Unregistering SW:', reg.scope);
                return reg.unregister();
              })
            );
          }).then(() => {
            // 모든 캐시 삭제
            return caches.keys().then(cacheNames => {
              return Promise.all(
                cacheNames.map(cacheName => {
                  console.log('[Dev] Deleting cache:', cacheName);
                  return caches.delete(cacheName);
                })
              );
            });
          }).then(() => {
            console.log('[Dev] All caches cleared, reloading...');
            // 캐시 버스터와 함께 새로고침
            if (!sessionStorage.getItem('dev-cache-cleared')) {
              sessionStorage.setItem('dev-cache-cleared', 'true');
              window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now() + '&_nocache=1';
            }
          });
        }
      }
    </script>
    <div id="root" translate="no"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics disabled for performance -->
  </body>
