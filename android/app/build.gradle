// app/build.gradle — Capacitor Android App Module
apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

// 키스토어 자격증명을 소스코드에서 분리 — keystore.properties (git-ignored) 에서 로드
// CI/CD 환경: 환경변수 KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS 로 fallback
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.mycoupon.app"
    compileSdk rootProject.ext.compileSdkVersion

    signingConfigs {
        release {
            storeFile file(keystoreProperties['storeFile'] ?: System.getenv('STORE_FILE') ?: 'mycoupon-release.keystore')
            storePassword keystoreProperties['storePassword'] ?: System.getenv('KEYSTORE_PASSWORD') ?: ''
            keyAlias keystoreProperties['keyAlias'] ?: System.getenv('KEY_ALIAS') ?: 'mycoupon'
            keyPassword keystoreProperties['keyPassword'] ?: System.getenv('KEY_PASSWORD') ?: ''
        }
    }

    defaultConfig {
        applicationId "com.mycoupon.app"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 6
        versionName "1.1.4"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            // [수정된 부분] 위에서 만든 release 설정을 적용함
            signingConfig signingConfigs.release

            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = rootProject.ext.jvmTarget
    }
}

repositories {
    flatDir {
        dirs '../capacitor-android/libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"

    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase BoM — 모든 Firebase SDK 버전을 호환되는 조합으로 자동 관리
    implementation platform('com.google.firebase:firebase-bom:34.12.0')
    // FCM (Firebase Cloud Messaging) — 푸시 알림용
    implementation 'com.google.firebase:firebase-messaging'

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (Exception e) {
    logger.info("google-services.json not found, Push Notifications won't work")
}