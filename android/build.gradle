// Capacitor Android Project — Root build.gradle
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGP 8.7.3: Android Studio Meerkat 2024.3.1 지원 최대 안정 버전
        // AGP 8.13.0 → Meerkat 미지원 (호환 불가 에러 발생)
        classpath 'com.android.tools.build:gradle:8.7.3'
        // Kotlin 2.0.21: AGP 8.7.x + Android Studio Meerkat 호환 확인된 버전
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21'
        classpath 'com.google.gms:google-services:4.4.4'
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
